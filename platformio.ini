; ============================================================================
;  ESP32-BlueDriver  -  Bluetooth LE Wardriver firmware
;  Target board: ESP32-S3-DevKitC-1  N16R8  (16 MB Flash / 8 MB PSRAM)
; ============================================================================
;
;  Build:    pio run
;  Upload:   pio run -t upload
;  Monitor:  pio device monitor
;
;  The ESP32-S3 has a Bluetooth LE 5.0 radio only (no Bluetooth Classic),
;  so this firmware is a BLE wardriver.  See README.md for details.
; ============================================================================

[platformio]
default_envs = esp32-s3-devkitc1-n16r8

[env:esp32-s3-devkitc1-n16r8]
platform  = espressif32@^6.9.0
board     = esp32-s3-devkitc-1
framework = arduino

; ---- 16 MB flash, custom partition table with big SPIFFS/LittleFS log area ----
board_build.flash_mode   = qio
board_build.flash_size   = 16MB
board_build.partitions   = partitions.csv
board_build.filesystem   = littlefs

; ---- 8 MB Octal PSRAM (R8) ----
board_build.arduino.memory_type = qio_opi

monitor_speed  = 115200
upload_speed   = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1        ; USB serial console on the native port
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC=1
    ; NimBLE: observer/scanner + central (for the GATT enumeration pentest tool)
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL_DISABLED=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=3

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.3
    bblanchon/ArduinoJson@^7.2.0
    mikalhart/TinyGPSPlus@^1.1.0

lib_ldf_mode = deep+
